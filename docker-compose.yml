version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: jjtech_pg
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: jjtech_user
      POSTGRES_PASSWORD: jjtech_password
      POSTGRES_DB: jjtech_agendamento
    volumes:
      - jjtech_data:/var/lib/postgresql/data

volumes:
  jjtech_data: